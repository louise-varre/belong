<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RSVP — I Belong</title>
<meta name="description" content="RSVP to I Belong, an exhibition by Eldvarm at 3 Days of Design, Copenhagen 2026.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://use.typekit.net/gxt4rsc.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0E0E0C;
  --text: #E8E4DC;
  --text-soft: #B8B2A6;
  --text-mute: #8A867E;
  --gold: #EBC291;
  --line: rgba(232, 228, 220, 0.12);
  --beige: #FAF6EB;
  --ink: #1A1916;
}

html { scroll-behavior: smooth; }

body {
  background: var(--beige);
  color: var(--ink);
  font-family: 'Libre Baskerville', Georgia, serif;
  font-weight: 400;
  line-height: 1.65;
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* dark middle column, beige on the sides */
.page {
  width: 100%;
  max-width: 1080px;
  align-self: center;
  margin: 0 auto;
  background: var(--bg);
  color: var(--text);
  position: relative;
  z-index: 1;
  flex: 1;
}

img { max-width: 100%; display: block; }

/* ─────────── NAV ─────────── */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  padding: 22px 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(250, 246, 235, 0.94);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-bottom: 0.5px solid rgba(26, 25, 22, 0.08);
}
nav .nav-mark {
  display: flex;
  align-items: center;
  gap: 12px;
  text-decoration: none;
  color: var(--ink);
}
nav .nav-logo {
  height: 14px;
  width: auto;
  display: block;
}
nav .nav-sep {
  color: rgba(26, 25, 22, 0.4);
  font-size: 14px;
  line-height: 1;
}
nav .nav-italic {
  font-family: 'Libre Baskerville', serif;
  font-style: italic;
  font-size: 16px;
  color: var(--ink);
  letter-spacing: 0.01em;
  text-transform: none;
}
nav ul {
  list-style: none;
  display: flex;
  gap: 30px;
  align-items: center;
}
nav a.menu-link {
  font-family: 'Open Sans', sans-serif;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: rgba(26, 25, 22, 0.7);
  text-decoration: none;
  transition: color 0.2s ease;
}
nav a.menu-link:hover { color: var(--ink); }
nav a.menu-link.active { color: var(--ink); border-bottom: 1px solid var(--gold); padding-bottom: 2px; }
nav .rsvp-btn {
  background: var(--ink);
  color: var(--beige);
  border: 0.5px solid var(--ink);
  padding: 10px 22px;
  border-radius: 999px;
  transition: background 0.25s ease, color 0.25s ease;
  font-family: 'Open Sans', sans-serif;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  text-decoration: none;
}
nav .rsvp-btn:hover { background: var(--gold); color: var(--ink); border-color: var(--gold); }
nav .rsvp-btn.active { background: var(--gold); color: var(--ink); border-color: var(--gold); }

.nav-right { display: flex; align-items: center; gap: 30px; }
.nav-rsvp-mobile { display: none; }
.nav-toggle {
  display: none;
  background: transparent;
  border: 0;
  padding: 6px;
  cursor: pointer;
  width: 34px;
  height: 34px;
  z-index: 110;
  position: relative;
}
.nav-toggle span {
  display: block;
  width: 22px;
  height: 1.5px;
  background: var(--ink);
  margin: 5px auto;
  transition: transform 0.3s ease, opacity 0.3s ease;
}
.nav-toggle.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
.nav-toggle.open span:nth-child(2) { opacity: 0; }
.nav-toggle.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

/* ─────────── MAIN ─────────── */
main {
  flex: 1;
  padding: 130px 0 80px;
}
.container {
  max-width: 620px;
  margin: 0 auto;
  padding: 0 48px;
}

.eyebrow {
  font-family: 'Open Sans', sans-serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 22px;
  display: block;
  text-align: center;
}

h1.page-title {
  font-family: 'Open Sans', sans-serif;
  font-style: normal;
  font-weight: 600;
  font-size: clamp(26px, 3.2vw, 38px);
  line-height: 1.2;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--text);
  text-align: center;
  margin-bottom: 24px;
}

.intro {
  text-align: center;
  color: var(--text-soft);
  font-family: 'Libre Baskerville', Georgia, serif;
  font-style: italic;
  font-size: 16px;
  line-height: 1.6;
  max-width: 460px;
  margin: 0 auto 56px;
}

/* ─────────── FORM ─────────── */
form .row { margin-bottom: 32px; }
form label.field-label {
  display: block;
  font-family: 'Open Sans', sans-serif;
  font-size: 14px;
  font-weight: 500;
  letter-spacing: 0;
  text-transform: none;
  color: var(--text);
  margin-bottom: 14px;
}
form input[type="text"], form input[type="email"], form textarea {
  width: 100%;
  background: #fff;
  border: 0.5px solid rgba(232, 228, 220, 0.22);
  border-radius: 3px;
  padding: 14px 16px;
  font-family: 'Open Sans', sans-serif;
  font-size: 16px;
  color: var(--bg);
  transition: border-color 0.2s ease, background 0.2s ease;
}
form input:focus, form textarea:focus {
  outline: none;
  border-color: var(--gold);
  background: #fff;
}
form textarea {
  resize: none;
  min-height: 90px;
  font-family: 'Open Sans', sans-serif;
  font-style: normal;
  font-size: 16px;
}

.checkboxes {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.check-option {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 16px 18px;
  border: 0.5px solid rgba(232, 228, 220, 0.22);
  border-radius: 3px;
  cursor: pointer;
  transition: border-color 0.2s ease, background 0.2s ease;
}
.check-option:hover { border-color: rgba(235, 194, 145, 0.4); }
.check-option input { display: none; }
.check-option .dot {
  display: inline-block;
  width: 16px;
  height: 16px;
  border-radius: 2px;
  border: 1px solid var(--text-soft);
  flex-shrink: 0;
  margin-top: 2px;
  position: relative;
}
.check-option input:checked + .dot {
  border-color: var(--gold);
  background: var(--gold);
}
.check-option input:checked + .dot::after {
  content: "";
  position: absolute;
  left: 5px;
  top: 1px;
  width: 4px;
  height: 9px;
  border: solid var(--bg);
  border-width: 0 2px 2px 0;
  transform: rotate(45deg);
}
.check-option:has(input:checked) {
  border-color: var(--gold);
  background: rgba(235, 194, 145, 0.04);
}
.check-text {
  font-size: 14px;
  color: var(--text);
  line-height: 1.4;
}
.check-note {
  display: block;
  font-family: 'Libre Baskerville', Georgia, serif;
  font-size: 12px;
  font-style: italic;
  color: var(--text-mute);
  margin-top: 4px;
  line-height: 1.4;
}

.submit-row {
  text-align: center;
  margin-top: 36px;
}
.submit-btn {
  font-family: 'Open Sans', sans-serif;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--gold);
  border: 0.5px solid var(--gold);
  padding: 14px 36px;
  border-radius: 999px;
  background: transparent;
  cursor: pointer;
  transition: background 0.25s ease, color 0.25s ease;
}
.submit-btn:hover { background: var(--gold); color: var(--bg); }

.thank-you {
  display: none;
  text-align: center;
  font-family: 'Libre Baskerville', serif;
  font-style: italic;
  font-size: 22px;
  color: var(--gold);
  margin-top: 24px;
}

/* ─────────── FOOTER ─────────── */
footer {
  text-align: center;
  padding: 60px 24px 70px;
  background: var(--beige);
  color: var(--ink);
  border-top: 0.5px solid rgba(26, 25, 22, 0.12);
}
footer .footer-logo {
  height: 22px;
  width: auto;
  margin: 0 auto 14px;
}
footer .footer-line {
  font-family: 'Libre Baskerville', serif;
  font-style: italic;
  font-size: 13px;
  color: rgba(26, 25, 22, 0.55);
}

/* ─────────── MOBILE ─────────── */
@media (max-width: 760px) {
  nav { padding: 14px 20px; }
  .nav-right { gap: 14px; }
  .nav-rsvp-mobile { display: inline-flex; padding: 8px 16px; font-size: 11px; }
  .nav-toggle { display: block; }
  nav .nav-right > ul {
    position: fixed;
    top: 0; right: -100%;
    width: 78%;
    max-width: 320px;
    height: 100vh;
    background: rgba(250, 246, 235, 0.97);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 32px;
    padding: 80px 24px;
    transition: right 0.35s ease;
    z-index: 99;
    margin: 0;
  }
  nav .nav-right > ul.open { right: 0; }
  nav .nav-right > ul a { font-size: 14px; padding: 8px 0; }
  nav .nav-right > ul .rsvp-btn { padding: 12px 28px; font-size: 12px; }
  nav .nav-italic { font-size: 14px; }
  main { padding: 130px 0 70px; }
  .container { padding: 0 24px; }
  h1.page-title { font-size: 36px; }
  .intro { font-size: 16px; margin-bottom: 44px; }
}
</style>
</head>
<body>

<nav>
  <a class="nav-mark" href="index.html">
    <img src="images/eldvarm logo.png" alt="Eldvarm" class="nav-logo">
    <span class="nav-sep">·</span>
    <span class="nav-italic">I belong</span>
  </a>
  <div class="nav-right">
    <ul>
      <li><a class="menu-link" href="index.html">Exhibition</a></li>
      <li><a class="menu-link" href="talk.html">Talk</a></li>
      <li><a class="menu-link" href="drinks.html">Drinks</a></li>
      <li><a class="menu-link" href="details.html">Details</a></li>
      <li><a class="rsvp-btn active" href="rsvp.html">RSVP</a></li>
    </ul>
    <button class="nav-toggle" aria-label="Menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>

<div class="page">

<main>
  <div class="container">
    <span class="eyebrow">Please join us</span>
    <h1 class="page-title">RSVP</h1>
    <p class="intro">Let us know what you would like to join, and we will be in touch.</p>

    <form id="rsvp-form" action="https://formspree.io/f/mrejoake" method="POST">
      <div class="row">
        <label class="field-label" for="name">Name</label>
        <input type="text" name="name" id="name" required>
      </div>

      <div class="row">
        <label class="field-label" for="email">Email</label>
        <input type="email" name="email" id="email" required>
      </div>

      <div class="row">
        <label class="field-label">I would like to attend</label>
        <div class="checkboxes">
          <label class="check-option">
            <input type="checkbox" name="preview" value="yes">
            <span class="dot"></span>
            <span class="check-text">Private preview &nbsp;·&nbsp; 9 June
              <span class="check-note">Professionals only.</span>
            </span>
          </label>
          <label class="check-option">
            <input type="checkbox" name="talk" value="yes">
            <span class="dot"></span>
            <span class="check-text">Talk &nbsp;·&nbsp; 10 June, 3 to 4pm
              <span class="check-note">Places limited, we will confirm by email.</span>
            </span>
          </label>
          <label class="check-option">
            <input type="checkbox" name="drinks" value="yes">
            <span class="dot"></span>
            <span class="check-text">Drinks &nbsp;·&nbsp; 10 June, 4 to 6pm</span>
          </label>
          <label class="check-option">
            <input type="checkbox" name="exhibition" value="yes">
            <span class="dot"></span>
            <span class="check-text">Exhibition &nbsp;·&nbsp; 10 to 12 June</span>
          </label>
        </div>
      </div>

      <div class="row">
        <label class="field-label" for="message">A note (optional)</label>
        <textarea name="message" id="message"></textarea>
      </div>

      <div class="submit-row">
        <button type="submit" class="submit-btn">Send</button>
      </div>
    </form>
    <div class="thank-you" id="thank-you">Thank you. We will be in touch.</div>
  </div>
</main>

</div><!-- /.page -->

<footer>
  <a href="https://eldvarm.com" target="_blank" rel="noopener">
    <img src="images/eldvarm logo.png" alt="Eldvarm" class="footer-logo">
  </a>
  <div class="footer-line">3 Days of Design, Copenhagen 2026</div>
</footer>

<script>
const form = document.getElementById('rsvp-form');
form.addEventListener('submit', async (e) => {
  e.preventDefault();
  try {
    const data = new FormData(form);
    const res = await fetch(form.action, {
      method: 'POST',
      body: data,
      headers: { 'Accept': 'application/json' }
    });
    if (res.ok) {
      form.style.display = 'none';
      document.getElementById('thank-you').style.display = 'block';
    } else {
      alert('Something went wrong. Please try again.');
    }
  } catch (err) {
    alert('Something went wrong. Please try again.');
  }
});

const navToggle = document.querySelector('.nav-toggle');
const navList = document.querySelector('nav .nav-right > ul');
if (navToggle && navList) {
  navToggle.addEventListener('click', () => {
    const isOpen = navList.classList.toggle('open');
    navToggle.classList.toggle('open', isOpen);
    navToggle.setAttribute('aria-expanded', String(isOpen));
    document.body.style.overflow = isOpen ? 'hidden' : '';
  });
}
</script>

</body>
</html>
